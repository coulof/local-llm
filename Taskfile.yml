version: '3'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  test:
    desc: Run BATS unit and integration tests
    cmds:
      - bats tests/

  test:verbose:
    desc: Run BATS tests with TAP/verbose formatting
    cmds:
      - bats --formatter tap tests/

  benchmark:
    desc: Compare TTFT and generation speeds between llama.cpp (llama-bench) and MLX (mlx_lm.benchmark)
    cmds:
      - echo "=== Running llama.cpp (GGUF) Benchmark ==="
      - llama-bench -m models/Ministral-8B-Instruct-2410-Q5_K_M.gguf -p 512 -n 128 -ngl 99
      - echo ""
      - echo "=== Running Apple MLX Benchmark ==="
      - ./.venv/bin/python -m mlx_lm.benchmark --model mlx-community/Ministral-8B-Instruct-2410-4bit -p 512 -g 128
